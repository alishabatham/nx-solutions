kind = "web"
previewPath = "/"
title = "NX Solution"
version = "1.0.0"
id = "artifacts/nx-solution"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22239

[services.development]
run = "pnpm --filter @workspace/nx-solution run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nx-solution", "run", "build" ]
serve = "static"
publicDir = "artifacts/nx-solution/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22239"
BASE_PATH = "/"
